name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install dbt-snowflake
      - run: dbt deps
      - run: dbt parse --profiles-dir integration_tests --target snowflake
