version: 2

models:
  - name: base_table
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: revenue
        tests:
          - not_null
  - name: semantic_view_basic
    description: "Semantic view fixture used by the Cortex Agent example."
  - name: semantic_view_with_copy_grants
    config:
      copy_grants: true
  - name: table_refer_to_semantic_view
    columns:
      - name: region
        tests:
          - not_null
  - name: forecast_training_data
    description: "Minimal forecast training input without exogenous features."
  - name: forecast_predictions
    description: "Materialized forecast inference output from the forecast model instance."
  - name: anomaly_scoring_data
    description: "Scoring input with an extreme point for anomaly inference."
  - name: anomaly_detections
    description: "Materialized anomaly detection output from the anomaly model instance."
  - name: classification_predictions
    description: "Materialized classification predictions from the classification model instance."
  - name: cortex_agent_responses
    description: "Materialized Cortex Agent response for a sample semantic-view question."
  - name: cortex_search_documents
    description: "Integration fixture corpus for the Cortex Search service example."
  - name: cortex_search_service_example
    description: "Cortex Search service fixture used by the search-enabled Cortex Agent example."
  - name: cortex_agent_with_search_example
    description: "Cortex Agent fixture configured with a Cortex Search tool."
  - name: cortex_agent_search_responses
    description: "Materialized Cortex Agent response for a policy question answered via Cortex Search."
  - name: python_model_iris
    description: "Opt-in Snowflake Model Registry Iris classifier fixture."
    config:
      enabled: "{{ var('sf_ai_enable_registry_integration_tests', false) }}"
  - name: python_model_iris_predictions
    description: "Opt-in SQL inference output from the Iris registry model."
